name: python-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile-check gym_web.py
        run: python -m py_compile gym_web.py

      - name: Compile-check scripts/gymbro_daily_image.py
        run: python -m py_compile scripts/gymbro_daily_image.py

      - name: Install Flask + import-check gym_web
        run: |
          pip install -r requirements.txt
          python -c "import gym_web; print('gym_web imports OK')"